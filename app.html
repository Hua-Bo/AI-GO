    // ——— 2. 预计算每组的平均点 ———
    const meanDataArr = data.map(group =>
      group.boxData.map(vals =>
        vals.reduce((s, v) => s + v, 0) / vals.length
      )
    );

    // ——— 3. 初始化 & 生成 option ———
    const chart = echarts.init(document.getElementById('chart'));
    const N = data.length;
    const option = {
      title: {
        text: 'Multiple Categories',
        left: 'center'
      },
      tooltip: {
        trigger: 'item',
        formatter: p => {
          if (p.seriesType === 'boxplot') {
            const [min,q1,med,q3,max] = p.data;
            return `分类 ${p.seriesName}<br/>最小值: ${min.toFixed(2)}<br/>Q1: ${q1.toFixed(2)}<br/>中位数: ${med.toFixed(2)}<br/>Q3: ${q3.toFixed(2)}<br/>最大值: ${max.toFixed(2)}`;
          }
          if (p.seriesType === 'markPoint') {
            return `平均值: ${p.data.coord[1].toFixed(2)}`;
          }
        }
      },
      grid: { left:'10%', top:'15%', right:'10%', bottom:'15%' },
      xAxis: {
        type: 'category',
        data: data[0].axisData,
        boundaryGap: true
      },
      yAxis: {
        type: 'value',
        name: 'Value'
      },
      dataZoom: [
        { type:'inside', start:0, end:20 },
        { type:'slider', start:0, end:20, bottom:'5%' }
      ],
      series: data.map((group,i) => ({
        name: `category${i}`,
        type: 'boxplot',
        data: group.boxData,
        // —— 关键：每个系列宽度设为 100/N%，后面系列再加一点 gap 让它们并排 —— 
        boxWidth: `${(100 / N).toFixed(2)}%`,
        ...(i>0 ? { boxGap: '10%' } : {}),
        itemStyle: { borderColor:'#0052D9', borderWidth:2 },
        // —— 把平均值用 markPoint 标记在箱体正中 —— 
        markPoint: {
          symbol: 'circle',
          symbolSize: 8,
          itemStyle: { color: '#9ACB6D' },
          data: meanDataArr[i].map((m, idx) => ({ coord: [idx, m] }))
        }
      }))
    };

    chart.setOption(option);
  </script>
